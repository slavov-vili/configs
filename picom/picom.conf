# --- Backend & Performance ---
backend = "glx";
vsync = true;
glx-no-rebind-pixmap = true;
use-damage = true;


# --- Dimming ---
inactive-dim = 0.40;
inactive-dim-fixed = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

# --- Opacity ---
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [
  "window_type = 'menu'",
  "window_type = 'notification'",
  "window_type = 'i3-frame'"
];


# --- Corners ---
corner-radius = 2;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'i3-frame'"
];


# --- Shadows ---
shadow = false;
shadow-radius = 12;
shadow-opacity = 0.85;
shadow-offset-x = -12;
shadow-offset-y = -12;
# TODO: change this
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'",      # Prevents double-shadows on i3 containers
  "_GTK_FRAME_EXTENTS@:c",     # Fixes thick shadows on GTK3 apps
  "class_g = 'Polybar'",
  "class_g = 'i3bar'"
];


# --- Fading ---
fading = true;
fade-in-step = 0.5;
fade-out-step = 0.5;
fade-delta = 5;
