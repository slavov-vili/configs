# --------------------------------------
# Colour scheme
# --------------------------------------

# Color Palette
set $focused          #008080
set $focused_inactive #666666
set $slate_gray       #2f343f
set $bg_dark          #1e222a
set $text             #ffffff
set $text_muted       #888888

# Color_Class            Border             Background         Text          Indicator          Child_Border
client.focused           $focused           $focused           $text         $focused           $focused
client.focused_inactive  $focused_inactive  $focused_inactive  $text         $focused_inactive  $focused_inactive
client.unfocused         $slate_gray        $slate_gray        $text_muted   $slate_gray        $slate_gray
client.urgent            #e06c75            #e06c75            $text         #e06c75            #e06c75



# --------------------------------------
# Fonts
# --------------------------------------
# Font for window titles. Will also be used by the bar unless a different font
# is used in the bar {} block below.
# font pango:monospace 8
# This font is widely installed, provides lots of unicode glyphs, right-to-left
# text rendering and scalability on retina/hidpi displays (thanks to pango).
font pango:DejaVu Sans Mono 12

