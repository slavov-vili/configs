# --------------------------------------
# Executions
# --------------------------------------

# Compositor
exec --no-startup-id "picom"

# Background setter
exec_always "feh --bg-scale ~/Images/kali-dragon-dark.png"

# Start XDG autostart .desktop files using dex. See also
# https://wiki.archlinux.org/index.php/XDG_Autostart
exec --no-startup-id "dex --autostart --environment i3"

# xss-lock grabs a logind suspend inhibit lock and will use i3lock to lock the
# screen before suspend. Use loginctl lock-session to lock your screen.
# exec --no-startup-id xss-lock --transfer-sleep-lock -- i3lock --nofork



# --------------------------------------
# Daemons
# --------------------------------------
# Audio server
exec --no-startup-id "pipewire"

# Notification daemon
exec --no-startup-id "dunst"

# Process authentication framework
exec --no-startup-id "/usr/libexec/xfce-polkit"



# --------------------------------------
# Tray Icons
# --------------------------------------
# Power manager
exec --no-startup-id "xfce4-power-manager --daemon"

# Applet for NetworkManager
exec --no-startup-id "nm-applet"

# Applet for Bluetooth
exec --no-startup-id "blueman-applet"

# Icons of removable drives
exec --no-startup-id "udiskie --smart-tray"

# Applet for volume control
exec --no-startup-id "pasystray --key-grabbing"

# Keyboard language icon + switcher
# exec --no-startup-id "gxkb"

